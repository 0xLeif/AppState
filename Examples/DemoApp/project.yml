name: AppStateDemo
options:
  bundleIdPrefix: com.corvidlabs
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "3.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES

packages:
  AppState:
    path: ../..
  TodoCloud:
    path: ../Moderate/TodoCloud
  SettingsKit:
    path: ../Moderate/SettingsKit
  DataDashboard:
    path: ../Moderate/DataDashboard
  SecureVault:
    path: ../Moderate/SecureVault
  SyncNotes:
    path: ../Focused/SyncNotes
  MultiPlatformTracker:
    path: ../Focused/MultiPlatformTracker
  SwiftDataExample:
    path: ../SwiftDataExample

targets:
  AppStateDemo:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.corvidlabs.AppStateDemo
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: AppState
        product: AppState
      - package: TodoCloud
      - package: SettingsKit
      - package: DataDashboard
      - package: SecureVault
      - package: SyncNotes
      - package: MultiPlatformTracker
      - package: SwiftDataExample
        product: SwiftDataExampleLib

  AppStateDemoUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.corvidlabs.AppStateDemoUITests
        TEST_TARGET_NAME: AppStateDemo
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: AppStateDemo

schemes:
  AppStateDemo:
    build:
      targets:
        AppStateDemo: all
        AppStateDemoUITests: [test]
    test:
      targets:
        - AppStateDemoUITests
