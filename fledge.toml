# fledge.toml — project task definitions
# Docs: https://github.com/CorvidLabs/fledge#task-runner
# Detected project type: swift

[tasks]
build = "swift build"
test = "swift test"
# Treat warnings as errors to enforce strict Swift 6 cleanliness (mirrors CI).
# Prefer the env-gated APPSTATE_STRICT path used by GitHub Actions when available.
lint = "APPSTATE_STRICT=1 swift build && APPSTATE_STRICT=1 swift test"

[lanes.ci]
description = "Run the full CI pipeline (strict warnings + tests)"
steps = ["lint"]
