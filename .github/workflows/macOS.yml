name: macOS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
      env:
        APPSTATE_STRICT: "1"
    - name: Run tests
      run: swift test -v
      env:
        APPSTATE_STRICT: "1"
